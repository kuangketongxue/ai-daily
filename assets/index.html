<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080a;--surface:#0c1015;--card:#111820;--border:#1a2332;
  --text:#c8d6e5;--text2:#5a6e82;--dim:#2a3a4a;
  --neon:#00f0ff;--neon2:#0aff9d;--neon3:#ff3e6c;--amber:#ffb800;
  --glow:0 0 20px rgba(0,240,255,.15);
  --radius:6px;
}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,240,255,.015) 2px,rgba(0,240,255,.015) 4px);
  pointer-events:none;z-index:9999;
}
body::after{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,240,255,.06) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
a{color:var(--neon);text-decoration:none;transition:all .2s}
a:hover{color:var(--neon2);text-shadow:0 0 12px rgba(0,255,157,.3)}

/* ── HEADER ── */
.header{
  padding:48px 24px 32px;text-align:center;position:relative;z-index:1;
  border-bottom:1px solid var(--border);
}
.header::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--neon),transparent);
}
.logo{
  font-family:'JetBrains Mono',monospace;font-size:.75em;font-weight:700;
  color:var(--neon);letter-spacing:6px;text-transform:uppercase;margin-bottom:8px;
  opacity:.6;
}
.header h1{
  font-size:2.8em;font-weight:900;color:#fff;letter-spacing:-1px;
  text-shadow:0 0 40px rgba(0,240,255,.2);
}
.header h1 span{
  background:linear-gradient(135deg,var(--neon),var(--neon2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.date{font-family:'JetBrains Mono',monospace;color:var(--text2);font-size:.85em;margin-top:10px;letter-spacing:1px}

/* ── STATS BAR ── */
.stats-bar{
  display:flex;gap:1px;justify-content:center;margin-top:24px;flex-wrap:wrap;
  background:var(--border);max-width:700px;margin-left:auto;margin-right:auto;border-radius:var(--radius);overflow:hidden;
}
.stat{
  background:var(--surface);padding:14px 20px;text-align:center;flex:1;min-width:90px;
}
.stat .num{
  font-family:'JetBrains Mono',monospace;font-size:1.5em;font-weight:700;
  color:var(--neon);text-shadow:0 0 15px rgba(0,240,255,.3);
}
.stat .label{color:var(--text2);font-size:.72em;margin-top:3px;letter-spacing:.5px}

/* ── CONTROLS ── */
.controls{
  max-width:960px;margin:28px auto;padding:0 20px;
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;position:relative;z-index:1;
}
.search{
  flex:1;min-width:220px;padding:11px 18px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-size:.9em;font-family:'Noto Sans SC',sans-serif;outline:none;
  transition:all .25s;
}
.search:focus{border-color:var(--neon);box-shadow:0 0 15px rgba(0,240,255,.1)}
.search::placeholder{color:var(--dim)}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{
  padding:6px 14px;border-radius:var(--radius);font-size:.78em;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);color:var(--text2);
  font-family:'JetBrains Mono',monospace;letter-spacing:.3px;
  transition:all .2s;
}
.tag:hover{border-color:var(--neon);color:var(--neon)}
.tag.active{
  background:rgba(0,240,255,.1);border-color:var(--neon);color:var(--neon);
  box-shadow:0 0 12px rgba(0,240,255,.15);
}

/* ── MAIN ── */
.main{max-width:960px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}

/* ── SECTION ── */
.section{margin-top:40px}
.section-head{
  display:flex;align-items:center;gap:12px;margin-bottom:18px;
}
.section-icon{font-size:1.3em}
.section-title{
  font-family:'JetBrains Mono',monospace;font-size:.9em;font-weight:700;
  color:var(--neon);letter-spacing:1px;text-transform:uppercase;
}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.section-count{
  font-family:'JetBrains Mono',monospace;font-size:.75em;
  color:var(--dim);background:var(--surface);padding:3px 10px;
  border:1px solid var(--border);border-radius:var(--radius);
}

/* ── ITEM CARD ── */
.item{
  display:block;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 22px;margin-bottom:8px;
  transition:all .25s;position:relative;overflow:hidden;
}
.item::before{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--neon);opacity:0;transition:opacity .25s;
}
.item:hover{
  border-color:rgba(0,240,255,.3);background:#131c28;
  box-shadow:0 4px 20px rgba(0,0,0,.3),0 0 20px rgba(0,240,255,.05);
}
.item:hover::before{opacity:1}
.item-title{
  font-size:1em;font-weight:700;color:#e8edf2;line-height:1.6;
}
.item-title .emoji{margin-right:4px}
.item-summary{
  color:var(--text2);font-size:.85em;margin-top:6px;line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.item-meta{
  display:flex;gap:14px;margin-top:10px;font-size:.78em;color:var(--dim);
  font-family:'JetBrains Mono',monospace;letter-spacing:.3px;flex-wrap:wrap;
}
.item-meta .src{
  color:var(--neon2);font-weight:500;
  background:rgba(0,255,157,.08);padding:1px 8px;border-radius:3px;
}
.item-meta .score{color:var(--amber)}

/* ── EMPTY / LOADING ── */
.empty,.loading{text-align:center;padding:80px 20px;color:var(--text2)}
.empty .icon{font-size:3em;margin-bottom:16px;opacity:.5}
.loading-box{
  display:inline-flex;flex-direction:column;align-items:center;gap:16px;
}
.loader{
  width:48px;height:48px;border:2px solid var(--border);border-top-color:var(--neon);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{
  font-family:'JetBrains Mono',monospace;font-size:.8em;color:var(--dim);
  letter-spacing:2px;
}

/* ── FOOTER ── */
.footer{
  text-align:center;padding:30px 20px;font-size:.75em;color:var(--dim);
  font-family:'JetBrains Mono',monospace;letter-spacing:1px;
  border-top:1px solid var(--border);max-width:960px;margin:0 auto;
}
.footer a{color:var(--text2)}
.footer a:hover{color:var(--neon)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .header h1{font-size:1.8em}
  .logo{font-size:.65em;letter-spacing:4px}
  .controls{flex-direction:column}
  .stats-bar{flex-direction:column;gap:0}
  .stat{padding:10px 16px}
  .item{padding:14px 16px}
  .section-title{font-size:.8em}
}
</style>
</head>

 "source_name": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "category": "ai-industry", "published_at": "2026-05-30T00:00:00.090Z", "summary": "波士顿儿童医院通过部署OpenAI技术，用于改善患者护理并减轻运营负担，成功帮助诊断了超过40种罕见病病例。"}, {"id": "1841c01028ad", "title": "滑铁卢大学未来实验室展示AI原型", "url": "https://blog.google/innovation-and-ai/technology/ai/university-waterloo-labs", "source": "aihot", "source_name": "Google Blog：AI（RSS）", "category": "ai-industry", "published_at": "2026-05-30T00:00:00.090Z", "summary": "滑铁卢大学未来实验室的学生开发了用于重塑教育和工作未来的AI原型，其中包括手语辅导工具。"}]}, "ai-paper": {"label": "📄 论文", "items": [{"id": "bdd1acf3d699", "title": "GPIC：大规模视觉生成基准数据集发布", "url": "https://x.com/drfeifei/status/2060404846734512205", "source": "aihot", "source_name": "X：Fei-Fei Li (@drfeifei, World Labs)", "category": "ai-paper", "published_at": "2026-05-30T00:00:00.090Z", "summary": "我对这个适用于大规模生成模型新时代的视觉生成基准数据集感到非常兴奋！🤩"}]}, "ai-general": {"label": "🔥 综合热点", "items": [{"id": "823694b34f7e", "title": "🎬 OpenAI 发布 Codex 与 ChatGPT 大量更新【AI 早报 2026-05-30】", "url": "https://www.bilibili.com/video/BV11pVM6iERu", "source": "bilibili", "source_name": "B站·橘鸦Juya", "category": "ai-general", "published_at": "2026-05-30", "summary": "AI 早报 2026-05-30\n概览\n要闻\nCodex 为 Windows 端上线 Computer use 与远程控制功能\n#1\nChatGPT 更新 GPT-5.5 Instant 模型并推出长对话目录功能\n#2\nMiniMax M3 即将发布并招募中文开源社区评测者\n#3\n开发生态\nllama.cpp 发布官方新网站与统一命令行工具\n#4\nHermes Agent 推出 Tool Search 并发布 v0.15.1 修复补丁\n#5\n阿里云百炼宣布推出并开源百炼 CLI\n#6\n产品应用\n谷歌Gemini调整配额规则：Ultra会员视频生成量翻倍\n#7\nDeepSeek 增加对话修改与内容刷新次数限制，且专家模式暂不支持搜索\n#8\n行业动态\nOpenAI推出Rosalind Biodefense项目，加速生物防御与防疫\n#9\n前瞻与传闻\n报道称智谱AI正开发终端硬件产品，首款设备已获工信部试用证\n#10\nCodex 为 Windows 端上线 Computer use 与远程控制功能\n#1\nOpenAI\n发布了\nCodex\n重大更新，\nComputer use\n功能登陆\nWindows\n平台。可前台操控桌面应用进行测试和调试，并支持通过移动端或\nMac\n远程控制\nWindows\n设备。此外，本次更新还为后台\nAgent\n引入了便于识别的像素头像，新增了对所有历史聊天内容的搜索支持，并上线了包含\nToken\n活动详情的新个人资料面板。同时，\niOS\n版\nChatGPT\n也迎来了\nCodex\n专项更新，引入了\n/side\n临时对话等高级功能。\nOpenAI\n发布了\nCodex\n编程\nAgent\n的重大更新，正式将\nComputer use\n能力扩展至\nWindows\n平台。\n借助该功能，\nCodex\n能够在前台操作\nWindows\n桌面应用程序以执行测试和调试，并允许用户通过\nChatGPT\n移动端（\niOS\n/\nAndroid\n）或\nMac\n端远程启动和引导\nWindows\n机器上的任务。\n此外，本次更新还为后台\nAgent\n引入了便于跨面板识别的稳定像素头像，新增了对所有历史聊天内容的搜索支持，并上线了包含\nToken\n活动详情的新个人资料面板。\n同时，\niOS\n版本的\nChatGPT\n也迎来了大规模的\nCodex\n专项更新，引入了\n/side\n临时对话、差异摘要及快捷指令等高级功能。\nhttps://x.com/OpenAI/status/2060428604727771421\nhttps://x.com/OpenAIDevs/status/2060478367921831936\nChatGPT 更新 GPT-5.5 Instant 模型并推出长对话目录功能\n#2\nOpenAI\n更新了\nGPT-5.5 Instant\n模型，让回复更加自然，并移除了\nCanvas\n功能，改为直接在回复中提供\nwriting blocks\n与\ncode blocks\n。同时，\nChatGPT\n为包含五条以上回复的长对话新增了自动目录功能。此外，官方宣布\nGPT-4.5\n与\no3\n将分别于\n2026年6月\n和\n8月\n从\nChatGPT\n下线，\nAPI\n调用不受影响。\nOpenAI\n近日更新了\nChatGPT\n和\nAPI\n中的\nGPT-5.5 Instant\n模型，旨在提升回复的自然度并减少冗长的项目符号回复。\n官方成员称其在事实性和多语言性能上亦有改进。\n伴随此次更新，\nGPT-5.5 Instant\n和\nGPT-5.5 Thinking\n将不再支持\ncanvas\n，相关写作和编码功能转为直接在聊天回复中支持。\n付费用户可暂时通过旧模型继续使用\ncanvas\n。\n此外，官方宣布\nGPT-4.5\n和\nOpenAI o3\n将分别于\n6 月 27 日\n和\n8 月 26 日\n从\nChatGPT\n退役，此举仅影响\nChatGPT\n而不影响\nAPI\n。\n另一项新功能是，\nChatGPT\n现已为包含\n5\n条以上回复的长对话自动生成目录，方便用户快速导航。\nhttps://help.openai.com/en/articles/6825453-chatgpt-release-notes?utm_source=chatgpt.com\nhttps://x.com/ChatGPTapp/status/2060467129066070182\nMiniMax M3 即将发布并招募中文开源社区评测者\n#3\nMiniMax M3\n即将发布，目前正邀请中文开源社区\ncontributor\n参与前期评测。申请者需具备开源贡献经验并在验证信息中附上过往\nwork\n，通过后即可第一时间体验。\nMiniMax\nM3\n模型即将发布，目前已开始面向部分开发者启动前期评测。\n用户\nJiayuan (JY) Zhang\n通过社交平台表示，正邀请中文开源社区的 contributor 优先体验该模型。\n相关的飞书体验群由社区成员\n阿岛（@SkylerMiao7）\n建立。\n申请参与评测的开发者需要具备开源项目的贡献经验，无论是个人独立项目还是参与他人的项目均可。\n申请者在加入飞书群时，必须在验证信息中附上自己过去的开源 work。\n通过审核后方可第一时间体验到该模型。\nhttps://x.com/jiayuan_jy/status/2060283302649749982\nllama.cpp 发布官方新网站与统一命令行工具\n#4\nllama.cpp\n发布官方新网站\nllama.app\n，并推出跨平台统一命令行工具\nllama\n，支持一键安装、本地模型运行及第三方\nAgent\n集成。\nllama.cpp\n项目创始人\nGeorgi Gerganov\n宣布推出官方新网站 llamma.app，并发布跨平台统一的\nllama\n命令行工具。\n新工具通过单行安装命令或\nHomebrew\n、\nWinget\n等包管理器部署。\n安装后用户获得统一的\nllama\n入口点，既可运行模型服务，也能与\nPi\n等本地编码\nAgent\n自动对接。\n同时已下载的\nGGUF\n模型会被自动识别并复用，无需重复下载。\n该工具保留了现有\nllama.cpp\n的所有高级功能。\n官方称未来数月将重点迭代\nUX\n与引擎，加强同本地友好型第三方\nAgent\n的无缝集成，并将根据社区反馈持续调整。\nhttps://llama.app/\nhttps://x.com/ggerganov/status/2060394400237109567\nHermes Agent 推出 Tool Search 并发布 v0.15.1 修复补丁\n#5\nHermes Agent\n推出\nTool Search\n功能，按需加载\nMCP\n与非核心插件工具的\nschema\n以减少上下文，同时官方发布\nv0.15.1\n补丁，修复了\nDashboard\n无限重载等\nBug\n。\nHermes Agent\n推出\nTool Search\n功能并发布\nv0.15.1\n热修复补丁。\nTool Search\n通过三个桥接工具按需检索并调用非核心工具的\nschema\n，以释放模型上下文。\n该功能默认在可延迟工具占用超\n10%\n上下文时触发，不适用内置核", "meta": {"plays": 37571, "wechat_url": "https://mp.weixin.qq.com/s/xAOF8DKdH0PkQGBKaRkS8g"}}]}, "tip": {"label": "💡 技巧", "items": [{"id": "d2a1a32d7eff", "title": "最后一次技术面试", "url": "https://steve-yegge.medium.com/the-last-technical-interview-bc13ddcf4564", "source": "aihot", "source_name": "Hacker News 热门（buzzing.cc 中文翻译）", "category": "tip", "published_at": "2026-05-30T07:25:10.263Z", "summary": "Steve Yegge 在 Medium 发表观点文章《最后一次技术面试》，探讨 AI 时代传统技术面试的意义变化。文章在 Hacker News 社区获得 100 分关注。"}, {"id": "f68c03fbd9ca", "title": "这个 skill 看着不错，可将文字、URL 或文章直接生成公众号首图、小红书图文卡、教程步骤卡等视觉物料，支持 28 种布局和 10 种主题。", "url": "https://x.com/hongming731/status/2060487110906527820", "source": "aihot", "source_name": "X：洪明 (@hongming731)", "category": "tip", "published_at": "2026-05-30T00:00:00.090Z", "summary": "claude-design-card 是一款专为中文内容创作者设计的 Skill。它能将文字、URL 或文章直接转化为可发布的视觉卡片，如公众号首图、小红书图文卡、教程步骤卡等，支持 28 种布局与 10 种主题。其核心价值在于自动化了“写完文章”后最繁琐的流程：自动提炼重点、选择版式、生成 HTML 并截图成 PNG，替代了以往手动使用 Figma 或 Canva 等工具的步骤。该工具开源，适合经常撰写相关内容的创作者尝试。"}, {"id": "c7b7f262f8b2", "title": "亲测为实：难以置信的推理速度", "url": "https://x.com/rohanpaul_ai/status/2060409504693645440", "source": "aihot", "source_name": "X：Rohan Paul (@rohanpaul_ai)", "category": "tip", "published_at": "2026-05-30T00:00:00.090Z", "summary": "Kog团队在标准数据中心GPU上实现了极高的单用户推理速度，在8× AMD MI300X GPUs上达到3,000 tokens/s，在8× NVIDIA H200上达到2,100 tokens/s。相比常规推理速度（约100-300 tokens/s），实现了10-30倍提升。其核心思路是将LLM解码视为内存流问题，通过协同设计monokernel、重建同步机制、针对性内存访问映射及采用延迟张量并行的Laneformer模型架构，消除了传统流程的阻塞点。"}, {"id": "f34eb0754aa9", "title": "Adam’s Law：用高频词写Prompt效果更好", "url": "https://x.com/berryxia/status/2060212428584202428", "source": "aihot", "source_name": "X：Berry Xia (@berryxia)", "category": "tip", "published_at": "2026-05-30T00:00:00.090Z", "summary": "FaceMind团队用100种语言和四大核心任务实验发现，在语义不变的前提下，使用预训练语料中出现频率更高的词汇（高频表达）来撰写提示词或进行微调，可以显著提升大语言模型的表现。这被总结为Adam’s Law（文本频率定律），它为数据工程补上了“频率”这一新维度。原理在于高频表达能让模型在它最熟悉的概率空间内工作，从而优化输出质量。"}, {"id": "b54347ae018c", "title": "Cursor 团队发布《开发者习惯报告》", "url": "https://x.com/shao__meng/status/2060167182777249886", "source": "aihot", "source_name": "X：邵猛 (@shao__meng)", "category": "tip", "published_at": "2026-05-30T00:00:00.090Z", "summary": "报告显示，AI正深刻改变开发工作形态。开发者周均代码产出从约3.6K行增至8.6K行，更大规模的PR（千行以上）占比上升。AI智能体在单次会话中的工具调用数增加约30%，正在处理更复杂的任务。同时，被接受的AI代码在60分钟后的留存率从约76%提升至约81%，表明更多AI生成内容进入了实际代码库。这些趋势共同指向AI已从个人辅助工具，演进为推动开发向更大规模任务与自动化基础设施发展的核心力量。"}, {"id": "5abf9f7d0433", "title": "Claude Code——文档中未提及的所有可配置选项", "url": "https://buildingbetter.tech/p/i-read-the-claude-code-source-code", "source": "aihot", "source_name": "Hacker News 热门（buzzing.cc 中文翻译）", "category": "tip", "published_at": "2026-05-30T00:00:00.090Z", "summary": "该篇文章标题涉及“Claude Code”的可配置选项，但提供的正文内容仅包含一张图片和一个外部链接，未给出任何关于模型版本、参数、性能、价格或功能的具体信息。根据规则，无法在摘要中提及原文不存在的细节。"}, {"id": "8dd792a2412c", "title": "当公司过于\"AI上瘾\"时会发生什么？", "url": "https://techcrunch.com/video/what-happens-when-companies-become-too-ai-pilled", "source": "aihot", "source_name": "TechCrunch：AI（RSS）", "category": "tip", "published_at": "2026-05-30T00:00:00.090Z", "summary": "Box创始人Aaron Levie指出，决定用AI替代员工的人往往最不了解工作的实际内容，他将此称为“AI psychosis”。ClickUp近期为部署AI智能体裁员22%即是一例。2026年的科技行业裁员规模已接近2025年全年。"}, {"id": "67b389409f9c", "title": "特斯拉 FSD 安全性宣称遭质疑", "url": "https://www.ithome.com/0/956/864.htm", "source": "aihot", "source_name": "IT之家（RSS）", "category": "tip", "published_at": "2026-05-30T00:00:00.090Z", "summary": "特斯拉声称其全自动驾驶软件（FSD）安全性最高可达人类的10倍，但路透社调查发现此数据经不起推敲。参与训练FSD的员工表示该技术远未成熟，其安全演示高度依赖人工。统计方法被11位交通安全研究人员指出存在缺陷，例如与更广泛的联邦事故数据进行不恰当比较。相比之下，竞争对手Waymo采用了更严谨的统计方法。目前，特斯拉FSD仍需驾驶员主动监督，安全部署可能还需数年。"}, {"id": "d83ea1f7e842", "title": "Cognition的Scott Wu表示：AI编程智能体不应取代人类", "url": "https://techcrunch.com/2026/05/29/cognitions-scott-wu-says-ai-coding-agents-shouldnt-replace-humans", "source": "aihot", "source_name": "TechCrunch：AI（RSS）", "category": "tip", "published_at": "2026-05-30T00:00:00.090Z", "summary": "Cognition公司开发了Devvin，这是一个号称首个且最成功的AI编程智能体。其著名程序员创始人Scott Wu明确表示，该智能体并非旨在取代人类程序员。"}, {"id": "703c79cb2202", "title": "DynoSim：模拟帕累托前沿", "url": "https://developer.nvidia.com/blog/dynosim-simulating-the-pareto-frontier", "source": "aihot", "source_name": "NVIDIA Technical Blog（开发者技术博客 · RSS）", "category": "tip", "published_at": "2026-05-29T22:31:03.000Z", "summary": "现代大语言模型服务难以调优，因为每个部署都涉及模型后端、张量并行形状、预填充/解码分割、Worker数量、调度器设置、路由策略、KV缓存行为、自动扩展阈值和拓扑等相互关联的选择。这些选择在多个层级相互作用，局部优化可能导致瓶颈转移至其他环节。"}, {"id": "4032e65c4a3f", "title": "LlamaIndex 团队基于 Google Agents API 构建 LlamaParse/LiteParse 智能体模板", "url": "https://x.com/googleaidevs/status/2060439904929382700", "source": "aihot", "source_name": "X：Google AI for Developers (@googleaidevs)", "category": "tip", "published_at": "2026-05-29T19:15:29.000Z", "summary": "LlamaIndex 团队基于 Google 新发布的 Agents API 构建了一个模板，使智能体能够访问 LlamaParse 和 LiteParse，从而自动处理非结构化文档。其工作流程为：配置数据与输出的 Git 仓库，将仓库克隆至智能体沙箱，安装 LiteParse CLI 与 LlamaParse SDK 及相关技能，最后通过提示词驱动智能体自主执行任务。该模板最终形成一个可直接使用 LlamaParse 和 LiteParse 处理真实世界文档的智能体。"}, {"id": "fcfd6685cb01", "title": "参与我们的 I/O 2026 测验：该测验由 Google AI Studio 氛围编程生成", "url": "https://blog.google/innovation-and-ai/technology/ai/io-2026-vibe-coded-quiz", "source": "aihot", "source_name": "Google Blog：AI（RSS）", "category": "tip", "published_at": "2026-05-29T19:00:00.000Z", "summary": "Google 使用其开发工具 Google AI Studio，通过氛围编程（vibe coding）方式，创建了一个关于 Google I/O 2026 主要公告的在线测验。"}, {"id": "f182f6eb2051", "title": "Gemini架构师分享AI前沿探索幕后故事", "url": "https://x.com/GoogleAI/status/2060392191508488493", "source": "aihot", "source_name": "X：Google AI (@GoogleAI)", "category": "tip", "published_at": "2026-05-29T16:05:53.000Z", "summar }

    if(!items.length)continue;total+=items.length;

    html+='</div>'
  }
  if(!total)html='<div class="empty"><div class="icon">⊘</div><p>NO MATCHES</p></div>';
  document.getElementById('main').innerHTML=html
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function timeAgo(iso){if(!iso)return'';try{const d=new Date(iso);const diff=(Date.now()-d.getTime())/1000;if(diff<60)return'刚刚';if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';return Math.floor(diff/86400)+'d ago'}catch(e){return''}}

document.getElementById('search').addEventListener('input',renderItems);
loadData();
